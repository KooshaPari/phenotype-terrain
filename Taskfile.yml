version: "3"

vars:
  PROJECT: phenotype-terrain
  DOTNET_VERSION: "8.0"

tasks:
  build:
    desc: "Build with Unity stub"
    cmds:
      - dotnet build {{.PROJECT}}.csproj --configuration Release

  test:
    desc: "Run tests"
    cmds:
      - echo "No tests yet — add tests/ project and uncomment this task"

  format:
    desc: "Check C# formatting"
    cmds:
      - dotnet format --verify-no-changes --verbosity diagnostic

  format-fix:
    desc: "Auto-fix C# formatting"
    cmds:
      - dotnet format --verbosity diagnostic

  lint:
    desc: "Run dotnet format as lint"
    cmds:
      - task: format

  default:
    desc: "Run the full quality gate (build, lint)"
    cmds:
      - task: build
      - task: lint
